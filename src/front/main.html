<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>GoFind</title>
  <link href="style.css" rel="stylesheet">
  <script type="module" src="./index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>
<div class="page-container" id="pageContainer">
  <div class="page-container" id="mainContent">
    <header class="header">
      <div class="header-content">
        <h1><span style="color: dodgerblue; margin-right: -1%" > Go </span><span style="color: white;"> Find </span></h1>
        <div>
          <button id="logoutBtn" style="width: auto; padding: 0.5em 1em;">Logout</button>
        </div>
      </div>
    </header>
    <div class="main-layout" style="">
      <div class="left-panel" id="detailsPanel">
        <h2>Details</h2>
          <section>
              <h2 id="detailHeaderName"></h2>
              <div class="form-group"><label for="create-name">Name:</label><input id="create-name" type="text"></div>
              <div class="form-group"><label for="create-quantity">Quantity:</label><input id="create-quantity"
                                                                                           type="number"></div>
              <div class="form-group"><label for="create-description">Description:</label><input id="create-description"
                                                                                                 type="text">
              </div>
              <div class="form-group"><label for="create-tags">Tags (comma-separated):</label><input id="create-tags"
                                                                                                     type="text">
              </div>
              <div class="form-group"><label for="create-object">Container Name:</label><input id="create-object"
                                                                                               type="text"></div>
              <div style="display: flex; align-items: center;align-content: space-around; ">
                  <button id="createBtn" class="button">Update</button>
                  <button id="deleteBtn" class="delete-btn">Delete</button>
              </div>
          </section>
      </div>
      <div class="center-panel" id="viewPanel">
        <h2 class="view">
            <label style="width: 100%; padding: 0 0.25em; margin-bottom: 0">
                <input type="text" placeholder="Search">
            </label>
            <button class="wrapped">+</button>
        </h2>
        <div id="treeContainer"></div>
      </div>
      <details class="right-panel">
          <summary>API responses will appear here...</summary>
          <p id="response"></p>
      </details>
    </div>
  </div>
</div>
</body>
</html>
