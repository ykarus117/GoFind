<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>d3 test</title>
</head>
    <body>
    <div id="chart">
        <button id="load" style="position: relative">load</button>
    </div>
    </body>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script type="module">
    import { drawTree } from './app.js';
    document.getElementById('load').addEventListener('click', async () => {
        const response = await fetch('./data.json', {
            method: 'GET',
            headers: {
                'Accept': 'application/json',
            }
        });
        if (response.ok) {
            document.getElementById('chart').append(drawTree(await response.json()));
        }else{
            console.error(response.statusText);
        }
    });
</script>
</html>
