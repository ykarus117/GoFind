<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>GoFind</title>
  <link href="style.css" rel="stylesheet">
  <link href="assets/uicons-regular-rounded.css" rel="stylesheet">
  <script type="module" src="index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>
<div class="page-container" id="pageContainer">
  <div class="notificationPanel" id="notificationPanel"></div>
  <div class="page-container" id="mainContent">
    <header class="header">
      <div class="header-content">
        <h1><span style="color: dodgerblue; margin-right: -1%" > Go </span><span style="color: white;"> Find </span>
          <span class="line-md--search-twotone"></span>
        </h1>
        <div>
          <button id="logoutBtn" style="width: auto; padding: 0.5em 1em;">Logout</button>
        </div>
      </div>
    </header>

    <div class="main-layout">

      <div class="createPanel" id="createPanel">
        <div class="panel" id="create">
          <button id="closePanel" class="close"><i class="fi-rr-cross"></i></button>
          <p>Create</p>
          <form class="form-group" id="createForm">
            <label class="form-label" for="createForm-name">Name:<input id="createForm-name" placeholder="Item/Object name." type="text"></label>
            <label class="form-label" for="createForm-quantity">Quantity:<input id="createForm-quantity" placeholder="Will be omitted for objects." type="number"></label>
            <label class="form-lable" for="createForm-description">Description:<input id="createForm-description" placeholder="Can be empty." type="text"> </label>
            <label class="form-label" for="createForm-container">Container:<input id="createForm-container" placeholder="Can be empty." type="text"></label>
            <label class="form-label" for="createForm-tags">Tags:<input id="createForm-tags" placeholder="Tag1, Tag2, Tag3." type="text"></label>
          </form>
            <div style="display: flex; align-items: baseline; justify-content: space-around;" >
              <button id="createObjectBtn"> Object </button>
              <button id="createItemBtn"> Item </button>
            </div>
        </div>
      </div>

      <div class="left-panel" id="detailsPanel">
        <h2>Details <button class="close" id="detailSectionBtn"><i class="fi-rr-cross"></i></button></h2>
          <h2 id="detailHeaderName"></h2>
          <section id="details">
          </section>
          <div style="display: flex; align-items: center; align-content: space-around;">
              <button id="updateBtn" class="button">Update</button>
              <button id="deleteBtn" class="delete-btn">Delete</button>
          </div>
      </div>

      <div class="center-panel" id="viewPanel">
        <div style="width: 100%;">
          <div class="searchRow">
            <label style="width: 100%; padding: 0 0 0.1em; margin-bottom: 0">
              <input id="searchBar" class="search" autocomplete="off" type="text" placeholder="Search">
            </label>
          <button class="wrapped" id="newBtn"> <i class="fi-rr-plus"> </i> </button>
        </h2>
        <div class="treeContainer" id="treeContainer"> </div>
      </div>

      <div class="right-panel" id="itemsPanel">
        <details>
          <summary>API responses will appear here...</summary>
          <p id="response"></p>
        </details>
      </div>
    </div>
    <footer class="footer">
      test
    </footer>
  </div>
</div>
</body>
</html>
